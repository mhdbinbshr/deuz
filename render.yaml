services:
  - type: web
    name: deuz-co-cinematic
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1